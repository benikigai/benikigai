<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#6366f1;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="80%" style="stop-color:#6366f1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="200" fill="url(#bg)" rx="0"/>

  <!-- subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="200" fill="url(#grid)"/>

  <!-- accent line -->
  <rect x="0" y="156" width="900" height="1" fill="url(#accent)"/>

  <!-- small accent dots -->
  <circle cx="100" cy="40" r="1" fill="#6366f1" opacity="0.3"/>
  <circle cx="780" cy="60" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="650" cy="35" r="1" fill="#6366f1" opacity="0.25"/>
  <circle cx="250" cy="55" r="1" fill="#8b5cf6" opacity="0.15"/>

  <!-- name -->
  <text x="450" y="75" text-anchor="middle" font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="300" letter-spacing="8" fill="url(#textglow)">BENJAMIN SHYONG</text>

  <!-- tagline -->
  <text x="450" y="115" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" letter-spacing="3" fill="#a78bfa">HARDWARE TPM  ·  AI BUILDER  ·  SF</text>

  <!-- subtitle -->
  <text x="450" y="143" text-anchor="middle" font-family="'SF Pro Text', 'Inter', -apple-system, sans-serif" font-size="11" letter-spacing="1.5" fill="#64748b">APPLE  ·  META  ·  INJESTER.COM</text>
</svg>
